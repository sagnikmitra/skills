name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-dry:
    name: sync --dry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No npm install needed — sync.mjs is dependency-free Node stdlib.
      - name: Dry sync (no writes)
        run: node scripts/sync.mjs --dry --verbose

  site:
    name: typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/skills-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/skills-site/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
